<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc">
  <title id="title">TurnBack public release pipeline</title>
  <desc id="desc">Released routes, reverse instruction generation, Path Builder execution, and local scoring.</desc>
  <rect width="1200" height="340" fill="#f7f8fa"/>
  <rect x="40" y="90" width="210" height="120" rx="18" fill="#0A7EA4"/>
  <rect x="290" y="90" width="210" height="120" rx="18" fill="#1f883d"/>
  <rect x="540" y="90" width="210" height="120" rx="18" fill="#8A2BE2"/>
  <rect x="790" y="90" width="210" height="120" rx="18" fill="#D97706"/>
  <rect x="1040" y="90" width="120" height="120" rx="18" fill="#374151"/>
  <g fill="#ffffff" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="145" y="130" font-size="26" font-weight="700">36kroutes</text>
    <text x="145" y="162" font-size="16">Raw released routes</text>
    <text x="145" y="186" font-size="16">原始公开路线</text>

    <text x="395" y="122" font-size="23" font-weight="700">Reverse Instruction</text>
    <text x="395" y="148" font-size="23" font-weight="700">Generation</text>
    <text x="395" y="178" font-size="16">OpenAI / Gemini / BYO API</text>
    <text x="395" y="202" font-size="16">用户自带模型接口</text>

    <text x="645" y="130" font-size="26" font-weight="700">Path Builder</text>
    <text x="645" y="162" font-size="16">Graph-grounded execution</text>
    <text x="645" y="186" font-size="16">基于街道图的执行</text>

    <text x="895" y="130" font-size="24" font-weight="700">Local Similarity</text>
    <text x="895" y="162" font-size="16">Public scoring config</text>
    <text x="895" y="186" font-size="16">本地公开评分</text>

    <text x="1100" y="130" font-size="22" font-weight="700">Route</text>
    <text x="1100" y="156" font-size="22" font-weight="700">Generation</text>
    <text x="1100" y="182" font-size="14">easy / medium / hard</text>
  </g>
  <g stroke="#4b5563" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M250 150 H285"/>
    <path d="M500 150 H535"/>
    <path d="M750 150 H785"/>
    <path d="M1000 150 H1035"/>
  </g>
  <g fill="#4b5563">
    <polygon points="282,142 298,150 282,158"/>
    <polygon points="532,142 548,150 532,158"/>
    <polygon points="782,142 798,150 782,158"/>
    <polygon points="1032,142 1048,150 1032,158"/>
  </g>
  <text x="600" y="300" text-anchor="middle" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="20">
    Public release scope: raw routes + generation + prompting + Path Builder + local scoring
  </text>
</svg>

