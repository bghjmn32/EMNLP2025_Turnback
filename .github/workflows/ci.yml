name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/path_builder tests --select F,E9

      - name: Compile
        run: python -m compileall src/path_builder

      - name: Run tests
        run: pytest -q

      - name: Smoke CLI
        run: |
          python -m path_builder.cli --help >/dev/null
          python -m path_builder.cli generate-routes --help >/dev/null
          python -m path_builder.cli generate-reverse --help >/dev/null

